<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MokaClone POS - Professional Interface</title>
    <style>
        /* CSS RESET & BASE */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f7f6; display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR */
        .sidebar { width: 80px; background-color: #ffffff; border-right: 1px solid #ddd; display: flex; flex-direction: column; align-items: center; padding: 20px 0; }
        .sidebar-icon { width: 45px; height: 45px; background: #eef2f1; border-radius: 12px; margin-bottom: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; color: #555; }
        .sidebar-icon:hover, .sidebar-icon.active { background: #007bff; color: white; }

        /* MAIN CONTENT */
        .main-container { flex: 1; display: flex; flex-direction: column; }
        .top-bar { height: 70px; background: white; border-bottom: 1px solid #ddd; display: flex; align-items: center; padding: 0 30px; justify-content: space-between; }
        .search-input { width: 400px; padding: 10px 15px; border-radius: 8px; border: 1px solid #ddd; outline: none; background: #f9f9f9; }

        /* PRODUCT GRID */
        .product-area { flex: 1; padding: 25px; overflow-y: auto; }
        .category-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { padding: 8px 18px; background: white; border-radius: 20px; font-size: 14px; cursor: pointer; border: 1px solid #ddd; }
        .tab.active { background: #007bff; color: white; border-color: #007bff; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.2s; border: 1px solid transparent; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card:hover { transform: translateY(-3px); border-color: #007bff; }
        .card-img { height: 120px; background: #eee; display: flex; align-items: center; justify-content: center; font-size: 30px; }
        .card-info { padding: 12px; }
        .card-name { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
        .card-price { color: #007bff; font-weight: bold; font-size: 13px; }

        /* CART PANEL */
        .cart-panel { width: 380px; background: white; border-left: 1px solid #ddd; display: flex; flex-direction: column; }
        .cart-header { padding: 20px; border-bottom: 1px solid #eee; font-weight: bold; font-size: 18px; }
        .cart-items { flex: 1; overflow-y: auto; padding: 20px; }
        .cart-item { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 14px; }
        
        .cart-footer { padding: 20px; background: #fafafa; border-top: 1px solid #eee; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 10px; color: #666; }
        .total-row { display: flex; justify-content: space-between; margin-top: 15px; font-weight: bold; font-size: 20px; color: #333; }
        
        .btn-pay { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .btn-pay:hover { background: #0056b3; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-icon active">🛒</div>
        <div class="sidebar-icon">📊</div>
        <div class="sidebar-icon">📦</div>
        <div class="sidebar-icon">⚙️</div>
    </aside>

    <div class="main-container">
        <header class="top-bar">
            <input type="text" class="search-input" placeholder="Cari Menu atau Barcode...">
            <div><strong>Kasir:</strong> Admin Ganteng</div>
        </header>

        <div class="product-area">
            <div class="category-tabs">
                <div class="tab active">Semua Menu</div>
                <div class="tab">Kopi</div>
                <div class="tab">Makanan</div>
                <div class="tab">Minuman Non-Kopi</div>
            </div>

            <div class="grid" id="productGrid">
                </div>
        </div>
    </div>

    <section class="cart-panel">
        <div class="cart-header">Pesanan Saat Ini</div>
        <div class="cart-items" id="cartItems">
            <p style="text-align: center; color: #999; margin-top: 50px;">Belum ada pesanan</p>
        </div>
        
        <div class="cart-footer">
            <div class="summary-row"><span>Subtotal</span><span id="subtotal">Rp 0</span></div>
            <div class="summary-row"><span>Pajak (10%)</span><span id="tax">Rp 0</span></div>
            <div class="total-row"><span>Total</span><span id="total">Rp 0</span></div>
            <button class="btn-pay" onclick="checkout()">BAYAR</button>
        </div>
    </section>

    <script>
        const products = [
            { id: 1, name: "Espresso Single", price: 15000, icon: "☕" },
            { id: 2, name: "Caramel Macchiato", price: 28000, icon: "🥤" },
            { id: 3, name: "Beef Burger", price: 35000, icon: "🍔" },
            { id: 4, name: "Chicken Wings", price: 25000, icon: "🍗" },
            { id: 5, name: "Iced Tea", price: 10000, icon: "🍹" },
            { id: 6, name: "Chocolate Cake", price: 22000, icon: "🍰" },
        ];

        let cart = [];

        // Menampilkan Produk
        const grid = document.getElementById('productGrid');
        products.forEach(p => {
            grid.innerHTML += `
                <div class="card" onclick="addToCart(${p.id})">
                    <div class="card-img">${p.icon}</div>
                    <div class="card-info">
                        <p class="card-name">${p.name}</p>
                        <p class="card-price">Rp ${p.price.toLocaleString()}</p>
                    </div>
                </div>
            `;
        });

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            cart.push(product);
            renderCart();
        }

        function renderCart() {
            const cartDiv = document.getElementById('cartItems');
            const subtotalDiv = document.getElementById('subtotal');
            const taxDiv = document.getElementById('tax');
            const totalDiv = document.getElementById('total');

            if (cart.length === 0) {
                cartDiv.innerHTML = `<p style="text-align: center; color: #999; margin-top: 50px;">Belum ada pesanan</p>`;
                return;
            }

            cartDiv.innerHTML = cart.map((item, index) => `
                <div class="cart-item">
                    <span>${item.name}</span>
                    <strong>Rp ${item.price.toLocaleString()}</strong>
                </div>
            `).join('');

            const subtotal = cart.reduce((sum, item) => sum + item.price, 0);
            const tax = subtotal * 0.1;
            const total = subtotal + tax;

            subtotalDiv.innerText = `Rp ${subtotal.toLocaleString()}`;
            taxDiv.innerText = `Rp ${tax.toLocaleString()}`;
            totalDiv.innerText = `Rp ${total.toLocaleString()}`;
        }

        function checkout() {
            if (cart.length === 0) return alert("Keranjang masih kosong!");
            alert("Transaksi Berhasil! Total: " + document.getElementById('total').innerText);
            cart = [];
            renderCart();
            document.getElementById('subtotal').innerText = "Rp 0";
            document.getElementById('tax').innerText = "Rp 0";
            document.getElementById('total').innerText = "Rp 0";
        }
    </script>
</body>
</html>
